<!DOCTYPE html>
<html>
<head>
    <title>Bounce & Collect</title>
    <style>
        body { 
            background: #1a1a1a; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Menu Screen */
        #menuScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
        }

        #menuScreen.hidden {
            display: none;
        }

        .menu-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .menu-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .menu-subtitle {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-bottom: 40px;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .level-btn {
            width: 80px;
            height: 80px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .level-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .level-btn:active {
            transform: scale(0.95);
        }

        /* Game Screen */
        #gameScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #gameScreen.hidden {
            display: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { 
            margin-top: 20px; 
            margin-bottom: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stats { 
            font-size: 1.2rem; 
            font-weight: bold;
            color: white;
        }

        .back-btn {
            padding: 8px 16px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        canvas { 
            background: #2c3e50; 
            border: 5px solid #34495e; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hint { 
            color: #95a5a6; 
            font-size: 0.9rem; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>
    <!-- Menu Screen -->
    <div id="menuScreen">
        <div class="menu-container">
            <div class="menu-title">🎮 Bounce & Collect</div>
            <div class="menu-subtitle">Select a Level</div>
            <div class="levels-grid" id="levelsGrid"></div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden">
        <div class="game-wrapper">
            <div class="header">
                <span class="stats">Level: <span id="lvl">1</span> | Coins: <span id="cnt">0</span>/3</span>
                <button class="back-btn" id="backBtn">← Back to Menu</button>
            </div>
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <p class="hint">The ball bounces automatically. Collect all coins to unlock the exit!</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
